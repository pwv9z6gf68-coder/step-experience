        {sanctionWarning && (
          <div
            style={{
              background: "#f04a4a15",
              border: "1px solid #f04a4a44",
              borderRadius: 10,
              padding: "12px 16px",
              marginBottom: 16,
              fontSize: 13,
              color: "#f08080",
            }}
          >
            ⚠️ <strong>You are currently in SANCTION.</strong> Your benefits are reduced. You must meet{" "}
            {required} hrs/month for 2 consecutive months to cure. Every missed month deepens the cut.
          </div>
        )}

        {/* Event display */}
        {phase === "event" && event && (
          <div
            style={{
              background: event.type === "good" ? "#0a2a14" : "#2a0a0a",
              border: `1px solid ${event.type === "good" ? "#4aaf7044" : "#f04a4a44"}`,
              borderRadius: 12,
              padding: "18px 20px",
              marginBottom: 16,
            }}
          >
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 8 }}>
              {event.type === "good" ? "✅ Good News" : "⚠️ Life Event"}
            </div>
            <div style={{ fontSize: 14, lineHeight: 1.6, color: "#c8d0d8" }}>{event.text}</div>
            <button
              onClick={advanceMonth}
              style={{
                marginTop: 14,
                background: "linear-gradient(90deg, #f0a500, #d4900a)",
                color: "#0a0f1a",
                border: "none",
                borderRadius: 7,
                padding: "10px 24px",
                fontSize: 13,
                fontWeight: 700,
                cursor: "pointer",
              }}
            >
              Continue to Month {Math.min(month + 1, totalMonths)} →
            </button>
          </div>
        )}

        {/* Weekly work phase */}
        {phase === "monthly" && (
          <>
            <div
              style={{
                background: "#111827",
                borderRadius: 12,
                padding: "16px 18px",
                marginBottom: 14,
              }}
            >
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12, color: "#f0a500" }}>
                Month {month} — Log Your Hours
              </div>
              <div style={{ fontSize: 12, color: "#7a8a9a", marginBottom: 10 }}>
                Required: <strong style={{ color: "#e8eaf0" }}>{required} hrs</strong> this month
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                <button
                  onClick={() => setMonthlyHoursLogged((h) => Math.max(0, h - 8))}
                  style={{ ...btnStyle, background: "#1a2535", fontSize: 18, width: 36, height: 36 }}
                >
                  −
                </button>
                <div style={{ textAlign: "center", minWidth: 80 }}>
                  <div style={{ fontSize: 32, fontWeight: 800, color: monthlyHoursLogged >= required ? "#4aaf70" : "#f04a4a" }}>
                    {monthlyHoursLogged}
                  </div>
                  <div style={{ fontSize: 10, color: "#556" }}>hours logged</div>
                </div>
                <button
                  onClick={() => setMonthlyHoursLogged((h) => Math.min(200, h + 8))}
                  style={{ ...btnStyle, background: "#1a2535", fontSize: 18, width: 36, height: 36 }}
                >
                  +
                </button>
                <div style={{ fontSize: 11, color: "#556", marginLeft: 8, lineHeight: 1.5 }}>
                  Tap to adjust<br />in 8-hr blocks
                </div>
              </div>

              <ProgressBar
                value={monthlyHoursLogged}
                max={required}
                color={monthlyHoursLogged >= required ? "#4aaf70" : "#f0a500"}
                label="Monthly Hour Target"
              />
            </div>

            {/* Goal quests */}
            <div style={{ background: "#111827", borderRadius: 12, padding: "16px 18px", marginBottom: 14 }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4, color: "#f0a500" }}>
                Goal Quests
              </div>
              <div style={{ fontSize: 12, color: "#7a8a9a", marginBottom: 12 }}>
                Play a quest to make progress and earn bonus participation hours.
                {questBonusHours > 0 && (
                  <span style={{ color: "#4aaf70" }}> &nbsp;(+{questBonusHours} bonus hrs this month)</span>
                )}
              </div>
              {goals.map((g) => (
                <div
                  key={g.id}
                  style={{
                    background: g.completed ? "#0a2a14" : activities[g.id] ? "#f0a50010" : "#0d1117",
                    border: `1px solid ${g.completed ? "#4aaf7044" : activities[g.id] ? "#f0a50044" : "#2a3a4a"}`,
                    borderRadius: 8,
                    padding: "10px 14px",
                    marginBottom: 8,
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "center",
                    gap: 12,
                  }}
                >
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, color: g.completed ? "#4aaf70" : "#e8eaf0", marginBottom: 4 }}>
                      {g.completed ? "✅" : activities[g.id] ? "🔄" : "•"} {g.label}
                    </div>
                    <ProgressBar value={g.progress} max={100} color={g.completed ? "#4aaf70" : "#f0a500"} />
                  </div>
                  {!g.completed && (
                    <button
                      onClick={() => setActiveQuest(g)}
                      style={{
                        background: activities[g.id]
                          ? "#1a2535"
                          : "linear-gradient(90deg, #f0a500, #d4900a)",
                        color: activities[g.id] ? "#9aa8b8" : "#0a0f1a",
                        border: "none",
                        borderRadius: 7,
                        padding: "8px 14px",
                        fontSize: 12,
                        fontWeight: 800,
                        cursor: "pointer",
                        whiteSpace: "nowrap",
                      }}
                    >
                      {activities[g.id] ? "↻ Replay" : "▶ Play Quest"}
                    </button>
                  )}
                </div>
              ))}
            </div>

            {/* Compliance Review incoming banner */}
            {!bossTriggered && (month === (participant.mode.id === "sanction" ? 1 : 2)) && (
              <div style={{
                background: "#1a0a04", border: "1px solid #f04a4a66", borderRadius: 10,
                padding: "12px 16px", marginBottom: 14,
                display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12,
              }}>
                <div>
                  <div style={{ fontSize: 12, color: "#f04a4a", fontWeight: 700, marginBottom: 2 }}>⚠ COMPLIANCE REVIEW INCOMING</div>
                  <div style={{ fontSize: 12, color: "#9a7a6a" }}>A full audit is scheduled for Month {participant.mode.id === "sanction" ? 2 : 3}. Make sure your documentation is ready.</div>
                </div>
              </div>
            )}

            {/* Manual boss trigger — available any time compliance drops below 40 */}
            {!bossTriggered && compliance < 40 && (
              <div style={{
                background: "#1a0004",
                border: "1px solid #f04a4a88",
                borderRadius: 10,
                padding: "12px 16px",
                marginBottom: 14,
              }}>
                <div style={{ fontSize: 12, color: "#f04a4a", fontWeight: 700, marginBottom: 6 }}>🚨 EMERGENCY COMPLIANCE REVIEW TRIGGERED</div>
                <div style={{ fontSize: 12, color: "#9a6a6a", marginBottom: 10 }}>Your compliance dropped below 40%. The Office of Family Support has opened an audit. Face it now to restore your standing.</div>
                <button onClick={() => { setBossTriggered(true); setBossActive(true); }} style={{ background: "linear-gradient(90deg,#8a1010,#f04a4a)", color: "#fff", border: "none", borderRadius: 7, padding: "9px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                  Face Audit Now →
                </button>
              </div>
            )}

            {/* Coach message */}
            <div
              style={{
                background: "#0d1b2a",
                border: "1px solid #1a3a5c",
                borderRadius: 10,
                padding: "12px 16px",
                marginBottom: 14,
                display: "flex",
                gap: 12,
                alignItems: "flex-start",
              }}
            >
              <div style={{ fontSize: 28 }}>👤</div>
              <div>
                <div style={{ fontSize: 11, color: "#4a9af0", marginBottom: 4, letterSpacing: 1 }}>
                  YOUR STEP COACH
                </div>
                <div style={{ fontSize: 13, color: "#9aa8b8", lineHeight: 1.5 }}>
                  {compliance < 40
                    ? "Your compliance is critically low. You need to pass the audit before your case is at risk of termination."
                    : monthlyHoursLogged < required
                    ? `You still need ${required - monthlyHoursLogged} more hours to meet your monthly requirement. Don't let a gap become a sanction.`
                    : `Great work — you've met your ${required}-hour monthly requirement for Month ${month}. Keep the momentum going.`}
                </div>
              </div>
            </div>

            <button
              onClick={submitMonth}
              style={{
                width: "100%",
                background: "linear-gradient(90deg, #f0a500, #d4900a)",
                color: "#0a0f1a",
                border: "none",
                borderRadius: 8,
                padding: "14px",
                fontSize: 15,
                fontWeight: 700,
                cursor: "pointer",
              }}
            >
              Submit Month {month} Check-In →
            </button>
          </>
        )}

        {/* Activity Log */}
        {log.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <div style={{ fontSize: 11, color: "#556", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>
              Case Log
            </div>
            {log.slice(0, 5).map((entry, i) => (
              <div
                key={i}
                style={{
                  fontSize: 11,
                  color: "#556",
                  padding: "5px 10px",
                  borderLeft: "2px solid #2a3a4a",
                  marginBottom: 4,
                }}
              >
                {entry}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function GameOver({ result, onRestart, onLeaderboard }) {
  const success = result.compliance > 50 && result.goals.filter((g) => g.completed).length >= 1;
  const completedGoals = result.goals.filter((g) => g.completed);
  const [playerName, setPlayerName] = useState("");
  const [submitState, setSubmitState] = useState("idle"); // idle|submitting|done|error
  const [rank, setRank] = useState(null);

  const handleSubmit = async () => {
    if (!playerName.trim()) return;
    setSubmitState("submitting");
    const entry = {
      name: playerName.trim(),
      points: (result.fitapBalance || 0) + (result.snapBalance || 0),
      ebtTotal: (result.fitapBalance || 0) + (result.snapBalance || 0),
      fitap: result.fitapBalance || 0,
      snap: result.snapBalance || 0,
      mode: result.participant?.mode?.label || "Unknown",
      goals: completedGoals.length,
      weeks: result.week,
      hours: result.hours,
      stipend: result.stipendTotal || 0,
      compliance: result.compliance,
      success,
      date: new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }),
    };
    const ok = await postScore(entry);
    if (ok) {
      // Figure out rank
      const scores = await fetchScores();
      const pos = scores.findIndex(s => s.name === entry.name && s.points === entry.points && s.date === entry.date);
      setRank(pos + 1);
      setSubmitState("done");
    } else {
      setSubmitState(LEADERBOARD_CONFIGURED ? "error" : "unconfigured");
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:"#0a0f1a", fontFamily:"'Segoe UI',system-ui,sans-serif", color:"#e8eaf0", padding:24, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ maxWidth:480, width:"100%", textAlign:"center" }}>
        <div style={{ fontSize:64, marginBottom:12 }}>{success ? "🏆" : "📋"}</div>
        <div style={{ fontSize:28, fontWeight:800, marginBottom:8 }}>
          {result.reason==="terminated" ? "Case Terminated" : success ? "Case Closed — Self-Sufficient!" : "Program Ended"}
        </div>

        {/* Case summary */}
        <div style={{ background:"#111827", borderRadius:12, padding:"20px 24px", margin:"20px 0", textAlign:"left" }}>
          <div style={{ fontSize:13, color:"#7a8a9a", marginBottom:14 }}>CASE SUMMARY</div>
          {[
            { label:"🏆 Score (EBT Balance)",  val: `$${(result.fitapBalance||0)+(result.snapBalance||0)}` },
            { label:"Total Points",       val: result.totalPoints },
            { label:"Months Completed",   val: `${result.week} / 6` },
            { label:"Total Hours Logged", val: result.hours },
            { label:"Stipend Earned",     val: `$${result.stipendTotal || 0}` },
            { label:"FITAP Remaining",    val: `$${result.fitapBalance || 0}` },
            { label:"SNAP Remaining",     val: `$${result.snapBalance || 0}` },
            { label:"Final Compliance",   val: `${result.compliance}%` },
            { label:"Goals Achieved",     val: `${completedGoals.length} / ${result.goals.length}` },
          ].map(({ label, val }) => (
            <div key={label} style={{ display:"flex", justifyContent:"space-between", borderBottom:"1px solid #1a2535", padding:"8px 0", fontSize:14 }}>
              <span style={{ color:"#7a8a9a" }}>{label}</span>
              <span style={{ fontWeight:700, color:"#f0a500" }}>{val}</span>
            </div>
          ))}
          {completedGoals.length > 0 && (
            <div style={{ marginTop:14 }}>
              <div style={{ fontSize:11, color:"#556", marginBottom:8 }}>GOALS ACHIEVED</div>
              {completedGoals.map((g) => (
                <div key={g.id} style={{ fontSize:13, color:"#4aaf70", marginBottom:4 }}>✅ {g.label}</div>
              ))}
            </div>
          )}
        </div>

        {/* Score submission */}
        <div style={{ background:"#111827", borderRadius:12, padding:"18px 20px", marginBottom:20, textAlign:"left" }}>
          <div style={{ fontSize:13, color:"#f0a500", fontWeight:700, marginBottom:4 }}>🏅 Hall of Fame</div>
          <div style={{ fontSize:12, color:"#7a8a9a", marginBottom:14 }}>Submit your score to the all-time leaderboard.</div>

          {submitState === "idle" && (
            <div style={{ display:"flex", gap:8 }}>
              <input
                type="text"
                value={playerName}
                onChange={e => setPlayerName(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleSubmit()}
                placeholder="Enter your name..."
                maxLength={24}
                style={{ flex:1, background:"#0d1117", border:"1px solid #2a3a4a", borderRadius:7, padding:"9px 12px", color:"#e8eaf0", fontSize:14, outline:"none" }}
              />
              <button
                onClick={handleSubmit}
                disabled={!playerName.trim()}
                style={{ background: playerName.trim() ? "linear-gradient(90deg,#f0a500,#d4900a)" : "#2a3a4a", color: playerName.trim() ? "#0a0f1a" : "#556", border:"none", borderRadius:7, padding:"9px 18px", fontWeight:700, fontSize:13, cursor: playerName.trim() ? "pointer" : "not-allowed" }}
              >
                Submit
              </button>
            </div>
          )}

          {submitState === "submitting" && (
            <div style={{ color:"#f0a500", fontSize:13 }}>⏳ Submitting score...</div>
          )}

          {submitState === "done" && (
            <div style={{ color:"#4aaf70", fontSize:14, fontWeight:700 }}>
              ✅ Score submitted!{rank && ` You ranked #${rank} all-time.`}
            </div>
          )}

          {submitState === "error" && (
            <div style={{ color:"#f04a4a", fontSize:12 }}>⚠️ Submission failed — check your internet connection.</div>
          )}

          {submitState === "unconfigured" && (
            <div style={{ color:"#f0a500", fontSize:12 }}>
              ⚙️ Leaderboard not yet configured. See README for JSONBin setup.
            </div>
          )}
        </div>

        <div style={{ fontSize:13, color:"#7a8a9a", marginBottom:20, lineHeight:1.6 }}>
          {success
            ? "You navigated Louisiana's STEP program, met your participation requirements, and achieved your FSA goals. Real participants do this every day — often with far fewer resources."
            : "This is the reality many STEP participants face. Real barriers, real consequences. The program continues whether life cooperates or not."}
        </div>

        <div style={{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap" }}>
          <button onClick={onLeaderboard} style={{ background:"#1a2535", color:"#f0a500", border:"1px solid #f0a50033", borderRadius:8, padding:"12px 24px", fontSize:14, fontWeight:700, cursor:"pointer" }}>
            🏆 Hall of Fame
          </button>
          <button
            onClick={onRestart}
            style={{ background:"linear-gradient(90deg,#f0a500,#d4900a)", color:"#0a0f1a", border:"none", borderRadius:8, padding:"12px 24px", fontSize:14, fontWeight:700, cursor:"pointer" }}
          >
            New Case →
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── LEADERBOARD SCREEN ───────────────────────────────────────────────────────

function Leaderboard({ onBack }) {
  const [scores, setScores]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(false);

  useEffect(() => {
    if (!LEADERBOARD_CONFIGURED) { setLoading(false); return; }
    fetchScores()
      .then(s => { setScores(s.slice(0, 20)); setLoading(false); })
      .catch(() => { setError(true); setLoading(false); });
  }, []);

  const medals = ["🥇","🥈","🥉"];

  return (
    <div style={{ minHeight:"100vh", background:"#0a0f1a", fontFamily:"'Segoe UI',system-ui,sans-serif", color:"#e8eaf0", padding:20 }}>
      <div style={{ maxWidth:520, margin:"0 auto" }}>

        {/* Header */}
        <div style={{ textAlign:"center", marginBottom:24, paddingTop:12 }}>
          <div style={{ fontSize:42, marginBottom:6 }}>🏆</div>
          <div style={{ fontSize:11, letterSpacing:4, color:"#f0a500", textTransform:"uppercase", marginBottom:4 }}>All-Time</div>
          <div style={{ fontSize:26, fontWeight:900 }}>Hall of Fame</div>
          <div style={{ fontSize:12, color:"#556", marginTop:4 }}>Mr. Adrian's STEP Experience</div>
        </div>

        {/* Content */}
        {loading && (
          <div style={{ textAlign:"center", padding:40, color:"#4a6a8a" }}>
            <div style={{ fontSize:28, marginBottom:8 }}>⏳</div>
            Loading leaderboard...
          </div>
        )}

        {!loading && !LEADERBOARD_CONFIGURED && (
          <div style={{ background:"#111827", borderRadius:12, padding:"24px 20px", textAlign:"center" }}>
            <div style={{ fontSize:28, marginBottom:10 }}>⚙️</div>
            <div style={{ color:"#f0a500", fontWeight:700, marginBottom:8 }}>Leaderboard Not Yet Set Up</div>
            <div style={{ fontSize:13, color:"#7a8a9a", lineHeight:1.7 }}>
              To enable the Hall of Fame, create a free account at{" "}
              <strong style={{color:"#e8eaf0"}}>jsonbin.io</strong>, create a bin with{" "}
              <code style={{color:"#f0a500", fontSize:11}}>{"{ \"scores\": [] }"}</code>, then paste
              your Bin ID and API key into the top of <strong style={{color:"#e8eaf0"}}>app.jsx</strong>.
            </div>
          </div>
        )}

        {!loading && LEADERBOARD_CONFIGURED && error && (
          <div style={{ textAlign:"center", padding:40, color:"#f04a4a" }}>
            ⚠️ Could not load scores — check your connection.
          </div>
        )}

        {!loading && LEADERBOARD_CONFIGURED && !error && scores.length === 0 && (
          <div style={{ textAlign:"center", padding:40, color:"#4a6a8a" }}>
            <div style={{ fontSize:28, marginBottom:8 }}>📋</div>
            No scores yet — be the first on the board!
          </div>
        )}

        {!loading && scores.length > 0 && (
          <div>
            {/* Top 3 podium */}
            <div style={{ display:"flex", justifyContent:"center", alignItems:"flex-end", gap:10, marginBottom:20 }}>
              {[scores[1], scores[0], scores[2]].map((s, i) => {
                if (!s) return <div key={i} style={{width:100}} />;
                const pos = i===1 ? 0 : i===0 ? 1 : 2;
                const heights = [90, 120, 70];
                return (
                  <div key={i} style={{ textAlign:"center", width:100 }}>
                    <div style={{ fontSize:11, color:"#f0a500", fontWeight:700, marginBottom:4 }}>{s.name}</div>
                    <div style={{ fontSize:13, color:"#e8eaf0", marginBottom:4 }}>{s.points} pts</div>
                    <div style={{
                      height: heights[pos],
                      background: pos===0 ? "linear-gradient(180deg,#f0c030,#b8860b)" : pos===1 ? "linear-gradient(180deg,#c0c0c0,#808080)" : "linear-gradient(180deg,#cd7f32,#8b4513)",
                      borderRadius:"6px 6px 0 0",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:24
                    }}>
                      {medals[pos]}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Full list */}
            <div style={{ background:"#111827", borderRadius:12, overflow:"hidden" }}>
              {scores.map((s, i) => (
                <div key={i} style={{
                  display:"flex", alignItems:"center", gap:12, padding:"12px 16px",
                  borderBottom: i < scores.length-1 ? "1px solid #1a2535" : "none",
                  background: i < 3 ? "#f0a50008" : "transparent",
                }}>
                  <div style={{ width:28, textAlign:"center", fontSize: i<3 ? 18 : 13, color: i<3 ? "auto" : "#4a6a8a", fontWeight:700 }}>
                    {i < 3 ? medals[i] : `#${i+1}`}
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontWeight:700, fontSize:14, color:"#e8eaf0", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{s.name}</div>
                    <div style={{ fontSize:11, color:"#556", marginTop:2 }}>
                      {s.mode} · {s.goals} goals · {"$"}{s.stipend || 0} stipend · {s.date}
                    </div>
                  </div>
                  <div style={{ textAlign:"right", flexShrink:0 }}>
                    <div style={{ fontWeight:800, fontSize:16, color:"#4aaf70" }}>{"$"}{s.points}</div>
                    <div style={{ fontSize:10, color:"#556" }}>EBT left</div>
                  </div>
                  <div style={{ fontSize:16 }}>{s.success ? "✅" : "📋"}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <button
          onClick={onBack}
          style={{ display:"block", margin:"24px auto 0", background:"#1a2535", color:"#e8eaf0", border:"1px solid #2a3a4a", borderRadius:8, padding:"12px 32px", fontSize:14, fontWeight:700, cursor:"pointer" }}
        >
          ← Back
        </button>
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  componentDidCatch(e, i) { this.setState({ error: e.message + "\n" + (i&&i.componentStack||"").slice(0,600) }); }
  render() {
    if (this.state.error) return (
      <div style={{position:"fixed",inset:0,background:"#0a0f1a",color:"#f04a4a",padding:24,fontFamily:"monospace",fontSize:12,whiteSpace:"pre-wrap",zIndex:9999,overflow:"auto"}}>
        {"CRASH - SEND TO MR. ADRIAN:\n\n" + this.state.error}
      </div>
    );
    return this.props.children;
  }
}

function App() {
  const [screen, setScreen]           = useState("title");
  const [mode, setMode]               = useState(null);
  const [participant, setParticipant] = useState(null);
  const [fsa, setFsa]                 = useState(null);
  const [result, setResult]           = useState(null);

  return (
    <>
      {screen === "title" && (
        <TitleScreen
          onStart={() => setScreen("mode")}
          onLeaderboard={() => setScreen("leaderboard")}
        />
      )}
      {screen === "leaderboard" && (
        <Leaderboard onBack={() => setScreen("title")} />
      )}
      {screen === "mode" && (
        <ModeSelect
          onSelect={(m) => {
            setMode(m);
            setScreen("profile");
          }}
        />
      )}
      {screen === "profile" && (
        <ProfileBuilder
          mode={mode}
          onComplete={(p) => {
            setParticipant(p);
            setScreen("fsa");
          }}
        />
      )}
      {screen === "fsa" && (
        <FSABuilder
          participant={participant}
          onComplete={(f) => {
            setFsa(f);
            setScreen("game");
          }}
        />
      )}
      {screen === "game" && (
        <GamePlay
          participant={participant}
          fsa={fsa}
          onGameOver={(r) => {
            setResult({ ...r, participant });
            setScreen("gameover");
          }}
        />
      )}
      {screen === "gameover" && (
        <GameOver
          result={result}
          onLeaderboard={() => setScreen("leaderboard")}
          onRestart={() => {
            setMode(null);
            setParticipant(null);
            setFsa(null);
            setResult(null);
            setScreen("title");
          }}
        />
      )}
    </>
  );
}
