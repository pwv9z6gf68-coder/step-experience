// FITAP: household size = participant + children (source: ldh.la.gov/page/fitap)
const FITAP_BY_SIZE = { 1:244, 2:376, 3:484, 4:568, 5:654, 6:732, 7:804, 8:882, 9:954 };

// SNAP max allotment FFY2025-2026 (source: USDA/Louisiana, effective Oct 1 2025)
const SNAP_BY_SIZE  = { 1:292, 2:536, 3:768, 4:975, 5:1158, 6:1390, 7:1536, 8:1756 };

function getBenefits(participant) {
  const kids = participant.children || 0;
  const houseSize = Math.min(9, kids + 1);
  const snapSize  = Math.min(8, kids + 1);
  return {
    fitap: FITAP_BY_SIZE[houseSize] || 954,
    snap:  SNAP_BY_SIZE[snapSize]   || 1756,
  };
}

const JSONBIN_API_KEY = "$2a$10$55/OpviJLSjPdE9OgeOUPuBkbbfiQBJMwSVDs95YWluSAT3F2K/c.";
const JSONBIN_BASE    = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
const LEADERBOARD_CONFIGURED = !JSONBIN_BIN_ID.includes("PASTE");

async function fetchScores() {
  if (!LEADERBOARD_CONFIGURED) return [];
  try {
    const res = await fetch(JSONBIN_BASE + "/latest", {
      headers: { "X-Master-Key": JSONBIN_API_KEY }
    });
    const data = await res.json();
    return Array.isArray(data.record?.scores) ? data.record.scores : [];
  } catch { return []; }
}

async function postScore(entry) {
  if (!LEADERBOARD_CONFIGURED) return false;
  try {
    const current = await fetchScores();
    const updated = [...current, entry]
      .sort((a, b) => b.points - a.points)
      .slice(0, 100); // keep top 100 all-time
    await fetch(JSONBIN_BASE, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_API_KEY },
      body: JSON.stringify({ scores: updated }),
    });
    return true;
  } catch { return false; }
}

function FSABuilder({ participant, onComplete }) {
  const [goals, setGoals] = useState([]);
  const [steps, setSteps] = useState({});

  const toggleGoal = (g) => {
    if (goals.find((x) => x.id === g.id)) {
      setGoals((prev) => prev.filter((x) => x.id !== g.id));
      setSteps((prev) => { const n = { ...prev }; delete n[g.id]; return n; });
    } else if (goals.length < 3) {
      setGoals((prev) => [...prev, { ...g, progress: 0, completed: false }]);
    }
  };

  const toggleStep = (goalId, step) => {
    setSteps((prev) => ({
      ...prev,
      [goalId]: prev[goalId]?.includes(step)
        ? prev[goalId].filter((s) => s !== step)
        : [...(prev[goalId] || []), step],
    }));
  };

  const canProceed = goals.length >= 1 && goals.every((g) => (steps[g.id] || []).length >= 1);

  const byCategory = GOAL_OPTIONS.reduce((acc, g) => {
    acc[g.category] = [...(acc[g.category] || []), g];
    return acc;
  }, {});

  return (
    <div
      style={{
        minHeight: "100vh",
        background: "#0a0f1a",
        fontFamily: "'Segoe UI', system-ui, sans-serif",

            <Badge text={`${participant.barriers.length} barriers identified`} color="#f04a4a" />

        </div>

        {Object.entries(byCategory).map(([cat, catGoals]) => (

// ─── ARCADE QUEST ────────────────────────────────────────────────────────────
// Fully ref-based physics — no stale closures. Single setEntities per frame.
// Life Invasions interrupt gameplay with narrative events + obstacle surges.

function ArcadeQuest({ goal, mode, onFinish }) {
  const theme = QUEST_THEMES[goal.id] || QUEST_THEMES.employment;
  const FIELD_W = 360;
  const FIELD_H = 460;
  const PLAYER_W = 52;
  const DURATION = 35;
  const TARGET = 12;

  // ── render state ──
  const [renderEntities, setRenderEntities] = useState([]);
  const [renderPlayerX, setRenderPlayerX] = useState(FIELD_W / 2 - PLAYER_W / 2);
  const [renderBullets, setRenderBullets]  = useState([]);
  const [caught, setCaught]         = useState(0);
  const [obstaclesHit, setObstaclesHit] = useState(0);
  const [timeLeft, setTimeLeft]     = useState(DURATION);
  const [combo, setCombo]           = useState(0);
  const [flash, setFlash]           = useState(null);
  const [status, setStatus]         = useState("ready");
  const [invasion, setInvasion]     = useState(null);
  const [ammo, setAmmo]             = useState(5);
  const [explosion, setExplosion]   = useState(null); // {x,y} for blast flash

  // ── game refs (never stale) ──
  const playerXRef    = useRef(FIELD_W / 2 - PLAYER_W / 2);
  const entitiesRef   = useRef([]);
  const bulletsRef    = useRef([]);
  const ammoRef       = useRef(5);
  const caughtRef     = useRef(0);
  const obstHitRef    = useRef(0);
  const comboRef      = useRef(0);
  const timeRef       = useRef(DURATION);
  const statusRef     = useRef("ready");
  const rafRef        = useRef(null);
  const fieldRef      = useRef(null);
  const moveDir       = useRef(0);
  const lastTime      = useRef(0);
  const spawnTimer    = useRef(0);
  const invasionCooldown  = useRef(15);
  const invasionFired     = useRef(new Set());

  // sync status ref
  useEffect(() => { statusRef.current = status; }, [status]);

  // ── fire bullet — stored in ref so keyboard handler never has stale closure ──
  const fireBulletRef = useRef(null);
  const fireBullet = () => {
    if (statusRef.current !== "playing") return;
    if (ammoRef.current <= 0) return;
    ammoRef.current -= 1;
    setAmmo(ammoRef.current);
    const bx = playerXRef.current + PLAYER_W / 2 - 5;
    bulletsRef.current = [...bulletsRef.current, { id: Math.random(), x: bx, y: FIELD_H - 80 }];
  };
  fireBulletRef.current = fireBullet;

  // ── keyboard ──
  useEffect(() => {
    const dn = (e) => {
      if (e.key==="ArrowLeft") moveDir.current=-1;
      if (e.key==="ArrowRight") moveDir.current=1;
      if (e.key===" " || e.key==="ArrowUp") { e.preventDefault(); fireBulletRef.current && fireBulletRef.current(); }
    };
    const up = (e) => { if ((e.key==="ArrowLeft"&&moveDir.current===-1)||(e.key==="ArrowRight"&&moveDir.current===1)) moveDir.current=0; };
    window.addEventListener("keydown", dn);
    window.addEventListener("keyup", up);
    return () => { window.removeEventListener("keydown", dn); window.removeEventListener("keyup", up); };
  }, []);

  // ── pointer / touch ──
  const handlePointer = useCallback((clientX) => {
    if (!fieldRef.current) return;
    const rect = fieldRef.current.getBoundingClientRect();
    const rel  = ((clientX - rect.left) / rect.width) * FIELD_W;
    const nx   = Math.max(0, Math.min(FIELD_W - PLAYER_W, rel - PLAYER_W / 2));
    playerXRef.current = nx;
    setRenderPlayerX(nx);
  }, []);

  // ── flash helper ──
  const doFlash = useCallback((text, color) => {
    setFlash({ text, color });
    setTimeout(() => setFlash(null), 600);
  }, []);

  // ── spawn helper ──
  const spawnEntity = useCallback((options = {}) => {
    const obstacleRate = mode.id==="crisis" ? 0.54 : mode.id==="sanction" ? 0.50 : 0.40;
    const roll = options.forceObstacle ? 1 : Math.random();
    const emoji = options.emoji || null;
    let ent;
    if (emoji) {
      ent = { type:"obstacle", emoji, label:"Life Event", val:5 };
    } else if (roll < obstacleRate) {
      const o = OBSTACLES[Math.floor(Math.random()*OBSTACLES.length)];
      ent = { type:"obstacle", emoji:o.emoji, label:o.label, val:o.cost };
    } else if (roll > 0.93) {
      ent = { type:"power", emoji:theme.powerup, val:4 };
    } else {
      ent = { type:"hour", emoji:theme.token, val:1 };
    }
    ent.id  = Math.random();
    ent.x   = options.x !== undefined ? options.x : 20 + Math.random()*(FIELD_W-60);
    ent.y   = -32;
    const speedMod = options.fast ? 1.5 : 1;
    ent.vy  = (120 + Math.random()*90 + (mode.id==="sanction"?40:0)) * speedMod;
    return ent;
  }, [mode.id, theme]);

  // ── invasion surge: flood field with themed obstacle emojis ──
  const fireInvasionSurge = useCallback((inv) => {
    const surge = [];
    for (let i = 0; i < inv.obstacleCount; i++) {
      const em = inv.obstacleEmoji[i % inv.obstacleEmoji.length];
      surge.push({
        id: Math.random(),
        type: "obstacle",
        emoji: em,
        label: inv.title,
        val: 6,
        x: 16 + (i / inv.obstacleCount) * (FIELD_W - 48) + (Math.random()-0.5)*20,
        y: -60 - i*28,
        vy: 160 + Math.random()*60,
      });
    }
    entitiesRef.current = [...entitiesRef.current, ...surge];
  }, []);

  // ── check if an invasion should trigger ──
  const pickInvasion = useCallback(() => {
    const kids = mode.children || 0;
    const kidMultiplier = kids === 0 ? 0 : kids <= 2 ? 1 : kids <= 4 ? 2 : 3;
    const eligible = LIFE_INVASIONS.filter(inv =>
      inv.modes.includes(mode.id) &&
      !invasionFired.current.has(inv.id) &&
      (!inv.kidsMin || kids >= inv.kidsMin)
    );
    if (!eligible.length) return null;
    const totalW = eligible.reduce((s, i) => {
      // boost kid-specific invasions based on number of children
      const w = i.kidsMin ? i.weight * (1 + kidMultiplier * 0.5) : i.weight;
      return s + w;
    }, 0);
    let r = Math.random() * totalW;
    for (const inv of eligible) {
      const w = inv.kidsMin ? inv.weight * (1 + kidMultiplier * 0.5) : inv.weight;
      r -= w;
      if (r <= 0) return inv;
    }
    return eligible[eligible.length - 1];
  }, [mode.id, mode.children]);

  // ── main physics loop ──
  const startLoop = useCallback(() => {
    lastTime.current = performance.now();

    const tick = (now) => {
      if (statusRef.current !== "playing") return;

      const dt = Math.min((now - lastTime.current) / 1000, 0.05); // cap dt at 50ms
      lastTime.current = now;

      // decrement invasion cooldown
      invasionCooldown.current -= dt;

      // keyboard glide
      if (moveDir.current !== 0) {
        const nx = Math.max(0, Math.min(FIELD_W-PLAYER_W, playerXRef.current + moveDir.current*310*dt));
        playerXRef.current = nx;
        setRenderPlayerX(nx);
      }

      // countdown
      timeRef.current -= dt;
      if (timeRef.current <= 0) {
        timeRef.current = 0;
        cancelAnimationFrame(rafRef.current);
        setTimeLeft(0);
        setStatus("done");
        return;
      }
      setTimeLeft(Math.ceil(timeRef.current));

      // spawn
      spawnTimer.current += dt;
      const spawnInterval = 0.55 - (Math.max(0, DURATION - timeRef.current) * 0.006);
      if (spawnTimer.current > spawnInterval) {
        spawnTimer.current = 0;
        // random invasion check — once per possible spawn, low probability
        if (invasionCooldown.current <= 0 && Math.random() < 0.04) {
          const inv = pickInvasion();
          if (inv) {
            invasionFired.current.add(inv.id);
            invasionCooldown.current = 20;
            cancelAnimationFrame(rafRef.current);
            statusRef.current = "invasion";
            setInvasion(inv);
            setStatus("invasion");
            return;
          }
        }
        entitiesRef.current = [...entitiesRef.current, spawnEntity()];
      }

      // physics + collision
      const px = playerXRef.current;
      let newCaught = caughtRef.current;
      let newHit = obstHitRef.current;
      let newCombo = comboRef.current;
      let flashData = null;
      let newExplosion = null;

      // ── move bullets upward and check obstacle hits ──
      const BULLET_SPEED = 500;
      const survivingBullets = [];
      for (const b of bulletsRef.current) {
        const ny = b.y - BULLET_SPEED * dt;
        if (ny < 0) continue; // off screen
        let hit = false;
        entitiesRef.current = entitiesRef.current.filter(e => {
          if (hit) return true;
          const ex = e.x, ey = e.y;
          if (e.type === "obstacle" && Math.abs(b.x - ex) < 28 && Math.abs(ny - ey) < 28) {
            // bullet hit obstacle!
            newExplosion = { x: ex, y: ey };
            newCombo++;
            flashData = { text: "💥 SHOT!", color: "#f0c050" };
            hit = true;
            return false; // remove obstacle
          }
          return true;
        });
        if (!hit) survivingBullets.push({ ...b, y: ny });
      }
      bulletsRef.current = survivingBullets;
      setRenderBullets([...bulletsRef.current]);
      if (newExplosion) {
        setExplosion(newExplosion);
        setTimeout(() => setExplosion(null), 350);
      }

      const next = [];
      for (const e of entitiesRef.current) {
        const ny = e.y + e.vy * dt;
        const inZone = ny > FIELD_H-84 && ny < FIELD_H-18;
        const overlap = e.x > px-24 && e.x < px+PLAYER_W+8;

        if (inZone && overlap) {
          if (e.type === "hour") {
            newCaught++;
            newCombo++;
            flashData = { text:`+1 ${theme.catchLabel}`, color: theme.accent };
          } else if (e.type === "power") {
            newCaught += e.val;
            newCombo++;
            // refill ammo on power-up
            ammoRef.current = Math.min(10, ammoRef.current + 3);
            setAmmo(ammoRef.current);
            flashData = { text:`⭐ ${theme.powerLabel}! +${e.val} +3🔫`, color:"#4aaf70" };
          } else {
            newHit++;
            newCaught = Math.max(0, newCaught - 1);
            newCombo = 0;
            flashData = { text:`❌ ${e.label}`, color:"#f04a4a" };
          }
          continue; // consumed
        }
        if (ny > FIELD_H) continue; // off-screen
        next.push({ ...e, y: ny });
      }

      entitiesRef.current = next;

      // batch state updates only if changed
      if (newCaught !== caughtRef.current) { caughtRef.current = newCaught; setCaught(newCaught); }
      if (newHit !== obstHitRef.current)   { obstHitRef.current = newHit; setObstaclesHit(newHit); }
      if (newCombo !== comboRef.current)   { comboRef.current = newCombo; setCombo(newCombo); }
      if (flashData) doFlash(flashData.text, flashData.color);

      setRenderEntities([...entitiesRef.current]);
      rafRef.current = requestAnimationFrame(tick);
    };

    rafRef.current = requestAnimationFrame(tick);
  }, [spawnEntity, pickInvasion, doFlash, theme]);

  useEffect(() => {
    if (status === "playing") startLoop();
    return () => cancelAnimationFrame(rafRef.current);
  }, [status, startLoop]);

  // ── dismiss invasion: apply penalties + surge, resume ──
  const dismissInvasion = useCallback((inv) => {
    caughtRef.current = Math.max(0, caughtRef.current - Math.floor(inv.hoursLost / 2));
    setCaught(caughtRef.current);
    fireInvasionSurge(inv);
    // refill ammo after surviving invasion
    ammoRef.current = 5;
    setAmmo(5);
    bulletsRef.current = [];
    setRenderBullets([]);
    setInvasion(null);
    statusRef.current = "playing";
    setStatus("playing");
  }, [fireInvasionSurge]);

  const progressGain = Math.min(50, Math.round((caughtRef.current / TARGET) * 35) + (caughtRef.current >= TARGET ? 10 : 0));

  // ── SCREENS ──

  if (status === "ready") return (
    <Overlay bg={theme.bg}>
      <div style={{ textAlign:"center", maxWidth:380 }}>
        <div style={{ fontSize:52, marginBottom:6 }}>{theme.token}</div>
        <div style={{ fontSize:11, letterSpacing:3, color:theme.accent, textTransform:"uppercase", marginBottom:6 }}>Quest</div>
        <div style={{ fontSize:22, fontWeight:800, marginBottom:14, color:"#fff" }}>{goal.label}</div>
        <div style={{ background:"#00000044", borderRadius:10, padding:"16px 18px", fontSize:13, color:"#c8d0d8", lineHeight:1.8, textAlign:"left", marginBottom:20 }}>
          <div>🎯 Catch <strong style={{color:theme.accent}}>{TARGET} {theme.catchLabel}</strong> in {DURATION}s</div>
          <div>{theme.powerup} Grab <strong style={{color:"#4aaf70"}}>{theme.powerLabel}</strong> for +4 bonus hours</div>
          <div>🔫 <strong style={{color:"#f0c050"}}>Tap/click to SHOOT</strong> — destroy obstacles before they hit you</div>
          <div>🚗 <strong style={{color:"#f04a4a"}}>Dodge what you can't shoot</strong> — each hit costs an hour</div>
          <div>⭐ Catch power-ups to <strong style={{color:"#4aaf70"}}>refill ammo (+3)</strong></div>
          <div>⚡ <strong style={{color:"#f0c050"}}>LIFE INVASIONS</strong> may interrupt — brace yourself</div>
          <div style={{marginTop:8,color:"#8a98a8",fontSize:12}}>📱 Drag to move · Tap anywhere to fire 🔫 · ⌨️ Arrows + Space on desktop</div>
        </div>
        <button onClick={() => { statusRef.current="playing"; setStatus("playing"); }} style={arcadeBtn(theme.accent)}>
          Start Quest →
        </button>
      </div>
    </Overlay>
  );

  if (status === "invasion" && invasion) return (
    <Overlay bg="#1a0008">
      <div style={{ textAlign:"center", maxWidth:380 }}>
        <div style={{ fontSize:11, letterSpacing:4, color:"#f04a4a", textTransform:"uppercase", marginBottom:8 }}>⚡ LIFE INVASION</div>
        <div style={{ fontSize:48, marginBottom:10 }}>{invasion.emoji}</div>
        <div style={{ fontSize:20, fontWeight:900, color:"#fff", marginBottom:10, lineHeight:1.3 }}>{invasion.title}</div>
        <div style={{ background:"#00000055", borderRadius:10, padding:"14px 18px", fontSize:13, color:"#c8a0a0", lineHeight:1.7, marginBottom:16, textAlign:"left" }}>
          <div style={{marginBottom:8,color:"#e8c8c8"}}>{invasion.flavor}</div>
          <div style={{color:"#f04a4a",fontSize:12}}><strong>Impact:</strong> {invasion.penalty}</div>
        </div>
        <button
          onClick={() => dismissInvasion(invasion)}
          style={{ ...arcadeBtn("#f04a4a"), background:"linear-gradient(90deg,#8a0010,#f04a4a)", boxShadow:"0 4px 20px #f04a4a33" }}
        >
          Deal With It →
        </button>
      </div>
    </Overlay>
  );

  if (status === "done") {
    const cleared = caughtRef.current >= TARGET;
    return (
      <Overlay bg={theme.bg}>
        <div style={{ textAlign:"center", maxWidth:360 }}>
          <div style={{ fontSize:52, marginBottom:8 }}>{cleared ? "🌟" : "⏱️"}</div>
          <div style={{ fontSize:22, fontWeight:800, color:cleared?"#4aaf70":"#f0a500", marginBottom:6 }}>
            {cleared ? "Quest Cleared!" : "Time's Up"}
          </div>
          <div style={{ background:"#00000044", borderRadius:10, padding:"16px 20px", marginBottom:20 }}>
            {[
              ["Hours caught", `${caughtRef.current} / ${TARGET}`],
              ["Obstacles hit", obstHitRef.current],
              ["Goal progress earned", `+${progressGain}%`],
            ].map(([k,v]) => (
              <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", fontSize:14, borderBottom:"1px solid #ffffff11" }}>
                <span style={{color:"#9aa8b8"}}>{k}</span>
                <span style={{fontWeight:700,color:theme.accent}}>{v}</span>
              </div>
            ))}
          </div>
          <button onClick={() => onFinish({ progressGain, hoursWorked:Math.round(caughtRef.current/3), cleared })} style={arcadeBtn(theme.accent)}>
            Return to Case →
          </button>
        </div>
      </Overlay>
    );
  }

  // ── playing ──
  return (
    <Overlay bg={theme.bg}>
      <div style={{ width:"100%", maxWidth:FIELD_W, margin:"0 auto" }}>
        {/* HUD */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6, color:"#fff" }}>
          <div>
            <div style={{ fontSize:10, color:"#8a98a8", letterSpacing:1 }}>HOURS</div>
            <div style={{ fontSize:22, fontWeight:800, color:theme.accent }}>
              {caught}<span style={{fontSize:13,color:"#556"}}>/{TARGET}</span>
            </div>
          </div>
          <div style={{ textAlign:"center" }}>
            {combo > 2 && <div style={{ fontSize:12, fontWeight:700, color:"#f0c050" }}>🔥 {combo}x</div>}
            <div style={{ fontSize:10, color:"#556", letterSpacing:1 }}>OBSTACLES</div>
            <div style={{ fontSize:14, fontWeight:700, color: obstaclesHit > 3 ? "#f04a4a" : "#9aa8b8" }}>{obstaclesHit} hit</div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:10, color:"#8a98a8", letterSpacing:1 }}>TIME</div>
            <div style={{ fontSize:22, fontWeight:800, color:timeLeft<=8?"#f04a4a":"#fff" }}>{timeLeft}s</div>
          </div>
        </div>

        <div style={{ background:"#00000033", borderRadius:5, height:8, marginBottom:8, overflow:"hidden" }}>
          <div style={{ width:`${Math.min(100,(caught/TARGET)*100)}%`, height:"100%", background:theme.accent, borderRadius:5, transition:"width 0.15s" }} />
        </div>

        {/* Field */}
        <div
          ref={fieldRef}
          onMouseMove={(e) => handlePointer(e.clientX)}
          onClick={() => fireBulletRef.current && fireBulletRef.current()}
          onTouchMove={(e) => { e.preventDefault(); handlePointer(e.touches[0].clientX); }}
          onTouchStart={(e) => { e.preventDefault(); handlePointer(e.touches[0].clientX); fireBulletRef.current && fireBulletRef.current(); }}
          style={{
            position:"relative", width:"100%", height:FIELD_H,
            background:`linear-gradient(180deg, ${theme.bg} 0%, #000814 100%)`,
            border:`1px solid ${theme.accent}33`,
            borderRadius:12, overflow:"hidden", touchAction:"none", cursor:"crosshair",
          }}
        >
          {/* subtle scan lines */}
          <div style={{ position:"absolute", inset:0, backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 2px,#ffffff06 2px,#ffffff06 3px)", pointerEvents:"none" }} />

          {/* catch-zone line */}
          <div style={{ position:"absolute", bottom:66, left:0, right:0, height:1, background:`${theme.accent}28` }} />

          {/* bullets */}
          {renderBullets.map(b => (
            <div key={b.id} style={{
              position:"absolute", left:b.x, top:b.y,
              width:10, height:18,
              background:`linear-gradient(180deg, #fff, ${theme.accent})`,
              borderRadius:5,
              boxShadow:`0 0 8px ${theme.accent}`,
              pointerEvents:"none",
            }} />
          ))}

          {/* explosion flash */}
          {explosion && (
            <div style={{
              position:"absolute",
              left: `${(explosion.x / FIELD_W) * 100}%`,
              top: explosion.y - 10,
              fontSize: 32,
              pointerEvents:"none",
              animation:"none",
            }}>
              💥
            </div>
          )}

          {/* entities */}
          {renderEntities.map((e) => (
            <div key={e.id} style={{
              position:"absolute",
              left:`${(e.x/FIELD_W)*100}%`,
              top:e.y,
              fontSize: e.type==="power" ? 30 : 26,
              pointerEvents:"none",
              filter: e.type==="obstacle"
                ? "drop-shadow(0 0 4px #f04a4a88)"
                : e.type==="power"
                ? "drop-shadow(0 0 6px #4aaf7088)"
                : `drop-shadow(0 0 3px ${theme.accent}66)`,
              transform:"none",
              willChange:"top",
            }}>
              {e.emoji}
            </div>
          ))}

          {/* player */}
          <div style={{
            position:"absolute", bottom:12,
            left:`${(renderPlayerX/FIELD_W)*100}%`,
            width:PLAYER_W, textAlign:"center",
            fontSize:36, pointerEvents:"none",
            filter:`drop-shadow(0 0 8px ${theme.accent})`,
            willChange:"left",
          }}>
            🧺
          </div>

          {/* flash */}
          {flash && (
            <div style={{
              position:"absolute", top:"42%", left:0, right:0, textAlign:"center",
              fontSize:18, fontWeight:800, color:flash.color,
              textShadow:"0 2px 8px #000", pointerEvents:"none",
            }}>
              {flash.text}
            </div>
          )}
        </div>

        {/* Ammo bar */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:8 }}>
          <div style={{ fontSize:11, color:"#556" }}>
            Drag to move 🧺 · Tap to shoot 🔫
          </div>
          <div style={{ display:"flex", gap:4, alignItems:"center" }}>
            <span style={{ fontSize:11, color:"#8a98a8" }}>AMMO</span>
            {Array.from({length:10}).map((_,i) => (
              <div key={i} style={{ width:7, height:14, borderRadius:3, background: i < ammo ? theme.accent : "#2a3a4a" }} />
            ))}
          </div>
        </div>
      </div>
    </Overlay>
  );
}

// ─── COMPLIANCE BOSS FIGHT ───────────────────────────────────────────────────
// Bullet-hell / dodge variant. Red-tape blobs rain down in waves.
// Catch the CORRECT documents (matching glow), dodge the rest.
// Three waves. Survive all three to pass the review.

const BOSS_DOCS = [
  { emoji: "📋", label: "Activity Log",      good: true  },
  { emoji: "🧾", label: "Pay Stub",          good: true  },
  { emoji: "📅", label: "Appointment Sheet", good: true  },
  { emoji: "📄", label: "Verification Form", good: true  },
  { emoji: "⭐", label: "Goal Complete",      good: true  },
  { emoji: "❌", label: "Expired Form",       good: false },
  { emoji: "🚫", label: "Missing Signature",  good: false },
  { emoji: "⚠️", label: "Discrepancy",        good: false },
  { emoji: "💣", label: "Sanction Notice",    good: false },
  { emoji: "🔴", label: "Fraud Flag",         good: false },
];

const WAVE_CONFIG = [
  { label: "Wave 1 — Initial Review",    speed: 130, spawnRate: 0.9, target: 8,  duration: 25 },
  { label: "Wave 2 — Secondary Audit",   speed: 160, spawnRate: 0.75, target: 10, duration: 25 },
  { label: "Wave 3 — Final Disposition", speed: 200, spawnRate: 0.6,  target: 12, duration: 30 },
];

function ComplianceBoss({ mode, onFinish }) {
  const FIELD_W = 360;
  const FIELD_H = 480;
  const PLAYER_W = 52;

  const [waveIdx, setWaveIdx]     = useState(0);
  const [status, setStatus]       = useState("intro");
  const [renderPlayerX, setRenderPlayerX] = useState(FIELD_W/2-PLAYER_W/2);
  const [renderEntities, setRenderEntities] = useState([]);
  const [caught, setCaught]       = useState(0);
  const [hits, setHits]           = useState(0);
  const [timeLeft, setTimeLeft]   = useState(WAVE_CONFIG[0].duration);
  const [flash, setFlash]         = useState(null);
  const [combo, setCombo]         = useState(0);
  const [totalGood, setTotalGood] = useState(0);
  const [waveResults, setWaveResults] = useState([]);
  const [bossHealth, setBossHealth]   = useState(100);
  const [shakeField, setShakeField]   = useState(false);

  // refs
  const playerXRef  = useRef(FIELD_W/2-PLAYER_W/2);
  const entitiesRef = useRef([]);
  const caughtRef   = useRef(0);
  const hitsRef     = useRef(0);
  const comboRef    = useRef(0);
  const totalGoodRef = useRef(0);
  const timeRef     = useRef(WAVE_CONFIG[0].duration);
  const statusRef   = useRef("intro");
  const waveIdxRef  = useRef(0);
  const rafRef      = useRef(null);
  const fieldRef    = useRef(null);
  const moveDir     = useRef(0);
  const lastTimeRef = useRef(0);
  const spawnTimerRef = useRef(0);

  useEffect(() => { statusRef.current = status; }, [status]);
  useEffect(() => { waveIdxRef.current = waveIdx; }, [waveIdx]);

  const wave = WAVE_CONFIG[waveIdx];

  const keyboard = useEffect(() => {
    const dn = (e) => { if(e.key==="ArrowLeft") moveDir.current=-1; if(e.key==="ArrowRight") moveDir.current=1; };
    const up = (e) => { if((e.key==="ArrowLeft"&&moveDir.current===-1)||(e.key==="ArrowRight"&&moveDir.current===1)) moveDir.current=0; };
    window.addEventListener("keydown",dn); window.addEventListener("keyup",up);
    return () => { window.removeEventListener("keydown",dn); window.removeEventListener("keyup",up); };
  }, []);

  const handlePointer = useCallback((clientX) => {
    if (!fieldRef.current) return;
    const rect = fieldRef.current.getBoundingClientRect();
    const nx = Math.max(0, Math.min(FIELD_W-PLAYER_W, ((clientX-rect.left)/rect.width)*FIELD_W - PLAYER_W/2));
    playerXRef.current = nx;
    setRenderPlayerX(nx);
  }, []);

  const doShake = useCallback(() => { setShakeField(true); setTimeout(()=>setShakeField(false),400); }, []);
  const doFlash = useCallback((text,color) => { setFlash({text,color}); setTimeout(()=>setFlash(null),700); }, []);

  const startWaveLoop = useCallback(() => {
    lastTimeRef.current = performance.now();
    spawnTimerRef.current = 0;

    const tick = (now) => {
      if (statusRef.current !== "playing") return;
      const dt = Math.min((now - lastTimeRef.current)/1000, 0.05);
      lastTimeRef.current = now;

      if (moveDir.current !== 0) {
        const nx = Math.max(0, Math.min(FIELD_W-PLAYER_W, playerXRef.current + moveDir.current*300*dt));
        playerXRef.current = nx;
        setRenderPlayerX(nx);
      }

      timeRef.current -= dt;
      if (timeRef.current <= 0) {
        cancelAnimationFrame(rafRef.current);
        const wi = waveIdxRef.current;
        const wv = WAVE_CONFIG[wi];
        const passed = caughtRef.current >= wv.target;
        setWaveResults(r => [...r, { wave:wi+1, caught:caughtRef.current, hits:hitsRef.current, passed, label:wv.label }]);
        setStatus(passed ? "waveDone" : "failed");
        return;
      }
      setTimeLeft(Math.ceil(timeRef.current));

      // spawn
      const wv = WAVE_CONFIG[waveIdxRef.current];
      const badRate = mode.id==="sanction"?0.55:mode.id==="crisis"?0.50:0.42;
      spawnTimerRef.current += dt;
      if (spawnTimerRef.current > wv.spawnRate) {
        spawnTimerRef.current = 0;
        const isBad = Math.random() < badRate;
        const pool = BOSS_DOCS.filter(d => d.good === !isBad);
        const doc = pool[Math.floor(Math.random()*pool.length)];
        entitiesRef.current = [...entitiesRef.current, {
          id: Math.random(), emoji:doc.emoji, label:doc.label, good:doc.good,
          x: 16 + Math.random()*(FIELD_W-52), y:-36,
          vy: wv.speed + Math.random()*60,
          wobble:(Math.random()-0.5)*40, wt:0,
        }];
      }

      // physics + collision
      const px = playerXRef.current;
      let newCaught = caughtRef.current, newHits = hitsRef.current;
      let newCombo = comboRef.current, newTotalGood = totalGoodRef.current;
      let flashData = null, shake = false;

      const next = [];
      for (const e of entitiesRef.current) {
        const wt = (e.wt||0) + dt;
        const wx = e.x + Math.sin(wt*2.5)*(e.wobble||0)*0.3;
        const ny = e.y + e.vy*dt;
        const inZone = ny > FIELD_H-84 && ny < FIELD_H-18;
        const overlap = wx > px-22 && wx < px+PLAYER_W+8;
        if (inZone && overlap) {
          if (e.good) {
            newCaught++; newTotalGood++; newCombo++;
            setBossHealth(h => Math.max(0,h-8));
            flashData = { text:`✅ ${e.label}`, color:"#4aaf70" };
          } else {
            newHits++; newCombo=0;
            setBossHealth(h => Math.min(100,h+5));
            flashData = { text:`❌ ${e.label}!`, color:"#f04a4a" };
            shake = true;
          }
          continue;
        }
        if (ny > FIELD_H) continue;
        next.push({...e, y:ny, wt});
      }
      entitiesRef.current = next;

      if (newCaught !== caughtRef.current) { caughtRef.current=newCaught; setCaught(newCaught); }
      if (newHits !== hitsRef.current)     { hitsRef.current=newHits; setHits(newHits); }
      if (newCombo !== comboRef.current)   { comboRef.current=newCombo; setCombo(newCombo); }
      if (newTotalGood !== totalGoodRef.current) { totalGoodRef.current=newTotalGood; setTotalGood(newTotalGood); }
      if (flashData) doFlash(flashData.text, flashData.color);
      if (shake) doShake();

      setRenderEntities([...entitiesRef.current]);
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
  }, [mode.id, doFlash, doShake]);

  useEffect(() => {
    if (status === "playing") startWaveLoop();
    return () => cancelAnimationFrame(rafRef.current);
  }, [status, startWaveLoop]);

  const nextWave = () => {
    const next = waveIdx+1;
    if (next >= WAVE_CONFIG.length) { setStatus("passed"); return; }
    setWaveIdx(next);
    setCaught(0); caughtRef.current=0;
    setHits(0);   hitsRef.current=0;
    setCombo(0);  comboRef.current=0;
    entitiesRef.current=[];
    setRenderEntities([]);
    timeRef.current = WAVE_CONFIG[next].duration;
    setTimeLeft(WAVE_CONFIG[next].duration);
    setStatus("playing");
  };

  const complianceGain = status==="passed"
    ? Math.min(40, 20+Math.floor(totalGood/3))
    : -Math.min(30, 10+waveResults.filter(w=>!w.passed).length*8);

  const warnColor = hits>=3?"#f04a4a":hits>=2?"#f0a500":"#4aaf70";

  if (status === "intro") return (
    <Overlay bg="#0a0314">
      <div style={{ textAlign: "center", maxWidth: 380 }}>
        <div style={{ fontSize: 14, letterSpacing: 4, color: "#f04a4a", textTransform: "uppercase", marginBottom: 8 }}>⚠ BOSS FIGHT</div>
        <div style={{ fontSize: 30, fontWeight: 900, color: "#fff", marginBottom: 4 }}>COMPLIANCE REVIEW</div>
        <div style={{ fontSize: 13, color: "#9a8ab8", marginBottom: 20, letterSpacing: 1 }}>Office of Family Support · Case Audit</div>

        <div style={{ background: "#00000055", borderRadius: 12, padding: "18px 20px", marginBottom: 20, textAlign: "left", fontSize: 13, color: "#c8c0d8", lineHeight: 1.8 }}>
          <div>📋 <strong style={{ color: "#f0c050" }}>THREE WAVES</strong> of documents are incoming.</div>
          <div>✅ Catch <strong style={{ color: "#4aaf70" }}>VALID</strong> documents — activity logs, pay stubs, verifications.</div>
          <div>🚫 <strong style={{ color: "#f04a4a" }}>DODGE</strong> expired forms, missing signatures & sanction notices.</div>
          <div style={{ marginTop: 10, color: "#7a6a8a", fontSize: 12 }}>
            Each wave gets faster. Survive all three to pass review.<br />
            Fail a wave and your compliance takes a hit.
          </div>
        </div>

        <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap", marginBottom: 20 }}>
          {WAVE_CONFIG.map((w, i) => (
            <div key={i} style={{ background: "#ffffff11", borderRadius: 8, padding: "8px 14px", fontSize: 12, color: "#9a8ab8" }}>
              <div style={{ color: "#f0c050", fontWeight: 700 }}>Wave {i + 1}</div>
              <div>Catch {w.target} docs</div>
              <div style={{ color: "#f04a4a", fontSize: 11 }}>{Math.round((mode.id==="sanction"?0.55:0.42)*100)}% bad</div>
            </div>
          ))}
        </div>

        <button onClick={() => setStatus("playing")} style={{ ...arcadeBtn("#f04a4a"), background: "linear-gradient(90deg,#c01020,#f04a4a)", boxShadow: "0 4px 20px #f04a4a44" }}>
          Begin Audit →
        </button>
      </div>
    </Overlay>
  );

  if (status === "waveDone") return (
    <Overlay bg="#0a0314">
      <div style={{ textAlign: "center", maxWidth: 340 }}>
        <div style={{ fontSize: 48, marginBottom: 8 }}>✅</div>
        <div style={{ fontSize: 22, fontWeight: 800, color: "#4aaf70", marginBottom: 6 }}>
          Wave {waveIdx + 1} Cleared!
        </div>
        <div style={{ background: "#00000044", borderRadius: 10, padding: "14px 18px", marginBottom: 18, fontSize: 13 }}>
          <div style={{ color: "#9a8ab8", marginBottom: 8 }}>WAVE {waveIdx + 1} · {wave.label}</div>
          {[["Valid docs caught", caught], ["Bad docs hit", hits], ["Combo peak", combo]].map(([k,v]) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #ffffff11", color: "#c8c0d8", fontSize: 13 }}>
              <span>{k}</span><span style={{ fontWeight: 700, color: "#f0c050" }}>{v}</span>
            </div>
          ))}
        </div>
        {waveIdx + 1 < WAVE_CONFIG.length ? (
          <>
            <div style={{ fontSize: 13, color: "#9a8ab8", marginBottom: 16 }}>
              Next: <strong style={{ color: "#f04a4a" }}>{WAVE_CONFIG[waveIdx+1].label}</strong> — faster, meaner.
            </div>
            <button onClick={nextWave} style={{ ...arcadeBtn("#f04a4a"), background: "linear-gradient(90deg,#c01020,#f04a4a)" }}>
              Face Wave {waveIdx + 2} →
            </button>
          </>
        ) : (
          <button onClick={() => setStatus("passed")} style={{ ...arcadeBtn("#4aaf70"), background: "linear-gradient(90deg,#1a7a40,#4aaf70)" }}>
            See Final Verdict →
          </button>
        )}
      </div>
    </Overlay>
  );

  if (status === "failed") return (
    <Overlay bg="#1a0004">
      <div style={{ textAlign: "center", maxWidth: 360 }}>
        <div style={{ fontSize: 48, marginBottom: 8 }}>⚠️</div>
        <div style={{ fontSize: 22, fontWeight: 800, color: "#f04a4a", marginBottom: 6 }}>Review Failed</div>
        <div style={{ fontSize: 13, color: "#9a8ab8", marginBottom: 16 }}>
          You didn't catch enough valid documents in Wave {waveIdx + 1}.
        </div>
        <div style={{ background: "#00000044", borderRadius: 10, padding: "14px 18px", marginBottom: 18 }}>
          {waveResults.map((r) => (
            <div key={r.wave} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #ffffff11", fontSize: 13, color: "#c8c0d8" }}>
              <span>Wave {r.wave}: {r.label.split("—")[1]?.trim()}</span>
              <span style={{ color: r.passed ? "#4aaf70" : "#f04a4a", fontWeight: 700 }}>{r.passed ? "PASS" : "FAIL"}</span>
            </div>
          ))}
          <div style={{ marginTop: 10, color: "#f04a4a", fontWeight: 700, fontSize: 14 }}>
            Compliance Impact: {complianceGain}%
          </div>
        </div>
        <button onClick={() => onFinish({ passed: false, complianceGain })} style={{ ...arcadeBtn("#f04a4a"), background: "linear-gradient(90deg,#8a1010,#f04a4a)" }}>
          Return to Case
        </button>
      </div>
    </Overlay>
  );

  if (status === "passed") return (
    <Overlay bg="#001a0a">
      <div style={{ textAlign: "center", maxWidth: 380 }}>
        <div style={{ fontSize: 52, marginBottom: 8 }}>🏛️</div>
        <div style={{ fontSize: 11, letterSpacing: 4, color: "#4aaf70", textTransform: "uppercase", marginBottom: 6 }}>Case Cleared</div>
        <div style={{ fontSize: 26, fontWeight: 900, color: "#fff", marginBottom: 14 }}>Review Passed!</div>
        <div style={{ background: "#00000044", borderRadius: 10, padding: "16px 20px", marginBottom: 20 }}>
          {waveResults.map((r) => (
            <div key={r.wave} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #ffffff11", fontSize: 13, color: "#c8c0d8" }}>
              <span>Wave {r.wave}</span>
              <span style={{ color: "#4aaf70", fontWeight: 700 }}>{r.caught} docs · PASS</span>
            </div>
          ))}
          <div style={{ marginTop: 10, color: "#4aaf70", fontWeight: 700, fontSize: 14 }}>
            Compliance Restored: +{complianceGain}%
          </div>
          <div style={{ fontSize: 12, color: "#6a8a6a", marginTop: 4 }}>
            Total valid docs: {totalGood}
          </div>
        </div>
        <button onClick={() => onFinish({ passed: true, complianceGain })} style={{ ...arcadeBtn("#4aaf70"), background: "linear-gradient(90deg,#1a7a40,#4aaf70)", boxShadow: "0 4px 20px #4aaf7044" }}>
          Return to Case →
        </button>
      </div>
    </Overlay>
  );

  // ── PLAYING ──
  return (
    <Overlay bg="#0a0314">
      <div style={{ width: "100%", maxWidth: FIELD_W, margin: "0 auto" }}>
        {/* Boss health bar */}
        <div style={{ marginBottom: 6 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#9a8ab8", marginBottom: 3 }}>
            <span style={{ letterSpacing: 2 }}>COMPLIANCE OFFICER</span>
            <span style={{ color: "#f04a4a" }}>{bossHealth}%</span>
          </div>
          <div style={{ background: "#1a0a14", borderRadius: 4, height: 10, overflow: "hidden", border: "1px solid #f04a4a33" }}>
            <div style={{ width: `${bossHealth}%`, height: "100%", background: "linear-gradient(90deg,#c01020,#f04a4a)", transition: "width 0.2s", borderRadius: 4 }} />
          </div>
        </div>

        {/* HUD */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <div>
            <div style={{ fontSize: 10, color: "#8a7ab8", letterSpacing: 1 }}>WAVE {waveIdx+1}/{WAVE_CONFIG.length}</div>
            <div style={{ fontSize: 11, color: "#c8c0d8" }}>{wave.label.split("—")[1]?.trim()}</div>
          </div>
          {combo > 2 && <div style={{ fontSize: 13, fontWeight: 700, color: "#f0c050" }}>⚡ {combo}x</div>}
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 10, color: "#8a7ab8", letterSpacing: 1 }}>TIME</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: timeLeft <= 8 ? "#f04a4a" : "#fff" }}>{timeLeft}s</div>
          </div>
        </div>

        {/* Catch / Hits progress */}
        <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 10, color: "#4aaf70", marginBottom: 2 }}>✅ {caught}/{wave.target}</div>
            <div style={{ background: "#001a0a", height: 7, borderRadius: 4, overflow: "hidden" }}>
              <div style={{ width: `${Math.min(100,(caught/wave.target)*100)}%`, height: "100%", background: "#4aaf70", borderRadius: 4, transition: "width 0.15s" }} />
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 10, color: warnColor, marginBottom: 2 }}>❌ hits: {hits}</div>
            <div style={{ background: "#1a0004", height: 7, borderRadius: 4, overflow: "hidden" }}>
              <div style={{ width: `${Math.min(100,(hits/5)*100)}%`, height: "100%", background: warnColor, borderRadius: 4, transition: "width 0.15s" }} />
            </div>
          </div>
        </div>

        {/* Play field */}
        <div
          ref={fieldRef}
          onMouseMove={(e) => handlePointer(e.clientX)}
          onTouchMove={(e) => { e.preventDefault(); handlePointer(e.touches[0].clientX); }}
          onTouchStart={(e) => { e.preventDefault(); handlePointer(e.touches[0].clientX); }}
          style={{
            position: "relative",
            width: "100%",
            height: FIELD_H,
            background: "linear-gradient(180deg, #0a0314 0%, #14001a 50%, #1a0004 100%)",
            border: "1px solid #f04a4a44",
            borderRadius: 12,
            overflow: "hidden",
            touchAction: "none",
            cursor: "none",
            animation: shakeField ? "shake 0.3s ease" : "none",
          }}
        >
          {/* Scan lines effect */}
          <div style={{ position: "absolute", inset: 0, backgroundImage: "repeating-linear-gradient(0deg, transparent, transparent 3px, #ffffff04 3px, #ffffff04 4px)", pointerEvents: "none" }} />

          {/* catch zone */}
          <div style={{ position: "absolute", bottom: 68, left: 0, right: 0, height: 1, background: "#f04a4a22" }} />

          {/* entities */}
          {renderEntities.map((e) => {
            const wx = e.x + Math.sin((e.wt || 0) * 2.5) * (e.wobble || 0) * 0.3;
            return (
              <div
                key={e.id}
                style={{
                  position: "absolute",
                  left: `${(wx / FIELD_W) * 100}%`,
                  top: e.y,
                  fontSize: 26,
                  pointerEvents: "none",
                  filter: e.good
                    ? "drop-shadow(0 0 5px #4aaf7088)"
                    : "drop-shadow(0 0 6px #f04a4a88)",
                  willChange: "top",
                }}
              >
                {e.emoji}
              </div>
            );
          })}

          {/* player — briefcase */}
          <div
            style={{
              position: "absolute",
              bottom: 12,
              left: `${(renderPlayerX / FIELD_W) * 100}%`,
              width: PLAYER_W,
              textAlign: "center",
              fontSize: 36,
              pointerEvents: "none",
              filter: "drop-shadow(0 0 8px #f0c05088)",
              willChange: "left",
            }}
          >
            💼
          </div>

          {/* flash */}
          {flash && (
            <div style={{ position: "absolute", top: "40%", left: 0, right: 0, textAlign: "center", fontSize: 18, fontWeight: 800, color: flash.color, textShadow: "0 2px 10px #000", pointerEvents: "none" }}>
              {flash.text}
            </div>
          )}

          {/* wave label watermark */}
          <div style={{ position: "absolute", top: 10, left: 0, right: 0, textAlign: "center", fontSize: 10, color: "#ffffff11", letterSpacing: 3, textTransform: "uppercase" }}>
            {wave.label}
          </div>
        </div>

        <div style={{ textAlign: "center", fontSize: 11, color: "#6a5a7a", marginTop: 8 }}>
          Drag to move your briefcase 💼 &nbsp;·&nbsp; Arrow keys on desktop
        </div>

        <style>{`@keyframes shake { 0%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} 100%{transform:translateX(0)} }`}</style>
      </div>
    </Overlay>
  );
}

const btnStyle = {
  border: "1px solid #2a3a4a",
  borderRadius: 6,
  color: "#e8eaf0",
  cursor: "pointer",
  display: "flex",
  alignItems: "center",
  justifyContent: "center",
};

function GamePlay({ participant, fsa, onGameOver }) {
  const totalMonths = 6;
  const [month, setMonth] = useState(1);
  const [hours, setHours] = useState(0);
  const [morale, setMorale] = useState(75);
  const [compliance, setCompliance] = useState(participant.mode.id === "sanction" ? 30 : 100);
  const [goals, setGoals] = useState(fsa.goals.map((g) => ({ ...g, progress: 0, completed: false })));
  const [event, setEvent] = useState(null);
  const [log, setLog] = useState([]);
  const [phase, setPhase] = useState("monthly");
  const [monthlyHoursLogged, setMonthlyHoursLogged] = useState(0);
  const [totalPoints, setTotalPoints] = useState(0);
  const [stipendTotal, setStipendTotal] = useState(0);
  const [lastStipend, setLastStipend] = useState(null);
  const [consecutiveMisses, setConsecutiveMisses] = useState(participant.mode.id === "sanction" ? 1 : 0);
  const [autoSanctioned, setAutoSanctioned] = useState(false);
  const [activities, setActivities] = useState({});
  const [activeQuest, setActiveQuest] = useState(null);
  const [questBonusHours, setQuestBonusHours] = useState(0);
  const [bossActive, setBossActive] = useState(false);
  const [bossTriggered, setBossTriggered] = useState(false);
  const [sanctionWarning, setSanctionWarning] = useState(participant.mode.id === "sanction");

  // EBT accounts — loaded monthly, drained by obstacles
  const monthlyBenefits = getBenefits(participant);
  const [fitapBalance, setFitapBalance]   = useState(monthlyBenefits.fitap);
  const [snapBalance, setSnapBalance]     = useState(monthlyBenefits.snap);
  const [fitapLifetime, setFitapLifetime] = useState(monthlyBenefits.fitap);
  const [snapLifetime, setSnapLifetime]   = useState(monthlyBenefits.snap);
  const [ebtFlash, setEbtFlash]           = useState(null); // {fitap, snap} drain this event

  const required = participant.mode.monthlyHours;

  const getRandomEvent = () => {
    const pool =
      participant.mode.id === "incapacity"
        ? [...RANDOM_EVENTS, ...INCAPACITY_EVENTS]
        : RANDOM_EVENTS;
    return pool[Math.floor(Math.random() * pool.length)];
  };

  const submitMonth = () => {
    const ev = getRandomEvent();
    setEvent(ev);

    const adjustedHours = Math.max(0, monthlyHoursLogged + questBonusHours + (ev.hoursLost || 0));
    const newMorale = Math.max(0, Math.min(100, morale - (ev.moraleLoss || 0)));
    const metHours = adjustedHours >= required;

    // Stipend: $200 if hours met, $0 if not
    if (metHours) {
      setStipendTotal((s) => s + 200);
      setLastStipend("earned");
      setConsecutiveMisses(0);
    } else {
      setLastStipend("lost");
      const newMisses = consecutiveMisses + 1;
      setConsecutiveMisses(newMisses);
      // 2 consecutive months missed → auto-sanction
      if (newMisses >= 2 && !autoSanctioned) {
        setAutoSanctioned(true);
        setCompliance((c) => Math.max(0, c - 35));
        setSanctionWarning(true);
      }
    }

    const newCompliance = Math.max(
      0,
      Math.min(100, compliance + (metHours ? 5 : -15))
    );

    const newHours = hours + adjustedHours;

    const selectedGoalIds = Object.keys(activities).filter((k) => activities[k]);
    const updatedGoals = goals.map((g) => {
      if (selectedGoalIds.includes(g.id)) {
        const increment = Math.floor(Math.random() * 20) + 10;
        const newProgress = Math.min(100, g.progress + increment);
        return { ...g, progress: newProgress, completed: newProgress >= 100 };
      }
      return g;
    });

    const earnedPoints = updatedGoals
      .filter((g) => g.completed && !goals.find((og) => og.id === g.id)?.completed)
      .reduce((sum, g) => sum + g.points, 0);

    // Natural monthly burn: FITAP ~80% spent on rent/bills, SNAP ~90% on food
    // Applied before obstacle drain so base is realistic
    const naturalFitapBurn = Math.round(fitapBalance * 0.80);
    const naturalSnapBurn  = Math.round(snapBalance  * 0.90);

    // EBT drain from life events on top of natural burn
    const hoursLost = ev.hoursLost || 0;
    let fitapDrain = naturalFitapBurn;
    let snapDrain  = naturalSnapBurn;
    if (hoursLost > 0 && ev.type !== "good") {
      fitapDrain = Math.min(fitapBalance, naturalFitapBurn + Math.round(hoursLost * 7 + Math.random() * 20));
      snapDrain  = Math.min(snapBalance,  naturalSnapBurn  + Math.round(hoursLost * 10 + Math.random() * 25));
      setEbtFlash({ fitap: Math.round(hoursLost * 7), snap: Math.round(hoursLost * 10) });
      setTimeout(() => setEbtFlash(null), 3000);
    }
    const newFitap = Math.max(0, fitapBalance - fitapDrain);
    const newSnap  = Math.max(0, snapBalance  - snapDrain);
    setFitapBalance(newFitap);
    setSnapBalance(newSnap);
    setHours(newHours);
    setMorale(newMorale);
    setCompliance(newCompliance);
    setGoals(updatedGoals);
    setLog((prev) => [
      `Month ${month}: ${adjustedHours} hrs logged. ${metHours ? "✅ $200 stipend earned!" : "❌ Stipend lost — hours not met."} Compliance: ${newCompliance}%.`,
      ...prev,
    ]);
    setPhase("event");
  };

  const advanceMonth = () => {
    if (month >= totalMonths) {
      onGameOver({ goals, compliance, morale, totalPoints, hours, week: month, stipendTotal, fitapLifetime, snapLifetime, fitapBalance, snapBalance });
      return;
    }
    if (compliance <= 0) {
      onGameOver({ goals, compliance, morale, totalPoints, hours, week: month, stipendTotal, fitapLifetime, snapLifetime, fitapBalance, snapBalance, reason: "terminated" });
      return;
    }
    const nextMonth = month + 1;
    setMonth(nextMonth);
    setMonthlyHoursLogged(0);
    setQuestBonusHours(0);
    setActivities({});
    setEvent(null);
    setLastStipend(null);
    setPhase("monthly");
    setSanctionWarning(false);
    // EBT monthly deposit — NEW benefits load ON TOP of remaining balance (rollover)
    setFitapBalance(b => b + monthlyBenefits.fitap);
    setSnapBalance(b  => b + monthlyBenefits.snap);
    setFitapLifetime(l => l + monthlyBenefits.fitap);
    setSnapLifetime(l  => l + monthlyBenefits.snap);
    if (shouldTriggerBoss(nextMonth)) {
      setBossTriggered(true);
      setTimeout(() => setBossActive(true), 400);
    }
  };

  const toggleActivity = (id) =>
    setActivities((prev) => ({ ...prev, [id]: !prev[id] }));

  // Called when an arcade quest ends. Applies progress + bonus hours to the goal.
  const finishQuest = (goalId, { progressGain, hoursWorked, cleared }) => {
    setGoals((prev) =>
      prev.map((g) => {
        if (g.id !== goalId) return g;
        const newProgress = Math.min(100, g.progress + progressGain);
        return { ...g, progress: newProgress, completed: newProgress >= 100 };
      })
    );
    setActivities((prev) => ({ ...prev, [goalId]: true })); // mark worked this week
    setQuestBonusHours((h) => h + hoursWorked);
    if (cleared) setMorale((m) => Math.min(100, m + 5));
    setActiveQuest(null);
  };

  const finishBoss = ({ passed, complianceGain }) => {
    setCompliance((c) => Math.max(0, Math.min(100, c + complianceGain)));
    setMorale((m) => Math.min(100, m + (passed ? 10 : -10)));
    setBossActive(false);
    setLog((prev) => [
      `Month ${month}: Compliance Review — ${passed ? "PASSED ✅" : "FAILED ⚠️"} (${complianceGain > 0 ? "+" : ""}${complianceGain}% compliance)`,
      ...prev,
    ]);
  };

  // Trigger boss at week 6 (or week 4 in sanction) if not already done
  const shouldTriggerBoss = (currentMonth) =>
    !bossTriggered && (
      currentMonth === (participant.mode.id === "sanction" ? 2 : 3) ||
      (compliance < 40 && !bossTriggered)
    );

  const completedGoals = goals.filter((g) => g.completed).length;

  // Active boss fight takes over the screen
  if (bossActive) {
    return (
      <ComplianceBoss
        mode={{ ...participant.mode, children: participant.children }}
        onFinish={finishBoss}
      />
    );
  }

  // Active arcade quest takes over the screen
  if (activeQuest) {
    return (
      <ArcadeQuest
        goal={activeQuest}
        mode={{ ...participant.mode, children: participant.children }}
        onFinish={(res) => finishQuest(activeQuest.id, res)}
      />
    );
  }

  return (
    <div
      style={{
        minHeight: "100vh",
        background: "#0a0f1a",
        fontFamily: "'Segoe UI', system-ui, sans-serif",
        color: "#e8eaf0",
        padding: 16,
      }}
    >
      <div style={{ maxWidth: 640, margin: "0 auto" }}>
        {/* Header */}
        <div
          style={{
            background: "#111827",
            borderRadius: 12,
            padding: "14px 18px",
            marginBottom: 16,
            display: "flex",
            justifyContent: "space-between",
            alignItems: "center",
            flexWrap: "wrap",
            gap: 8,
          }}
        >
          <div>
            <div style={{ fontSize: 18, fontWeight: 800 }}>
              📋 {participant.name}'s Case
            </div>
            <div style={{ fontSize: 11, color: "#556" }}>

        <div style={{ background:"#111827", borderRadius:12, padding:"14px 16px", marginBottom:12 }}>
          <div style={{ fontSize:11, color:"#f0a500", letterSpacing:2, textTransform:"uppercase", marginBottom:10, fontWeight:700 }}>
            💳 Louisiana Purchase Card (EBT)
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <div style={{ background:"#0d1117", borderRadius:8, padding:"10px 12px", border:"1px solid #1a3a5c" }}>
              <div style={{ fontSize:10, color:"#4a9af0", letterSpacing:1, marginBottom:4 }}>FITAP CASH</div>

                {"$"}{fitapBalance}
              </div>

              </div>

              <div style={{ fontSize:22, fontWeight:800, color: snapBalance < monthlyBenefits.snap * 0.3 ? "#f04a4a" : "#4aaf70" }}>

              </div>
              <div style={{ fontSize:10, color:"#556", marginTop:2 }}>of {"$"}{monthlyBenefits.snap}/mo</div>
              <div style={{ background:"#1a2535", borderRadius:3, height:4, marginTop:6, overflow:"hidden" }}>
                <div style={{ width:`${Math.max(0,(snapBalance/monthlyBenefits.snap)*100)}%`, height:"100%", background:"#4aaf70", transition:"width 0.4s" }} />
              </div>

                <div style={{ fontSize:11, color:"#f04a4a", marginTop:4, fontWeight:700 }}>{"−$"}{ebtFlash.snap} obstacle hit!</div>

            </div>

            Household size {Math.min(9, (participant.children||0)+1)} · Benefits based on official Louisiana LDH/USDA FFY2025-26 rates
          </div>
          {(fitapBalance === 0 || snapBalance === 0) && (
            <div style={{ marginTop:8, fontSize:12, color:"#f04a4a", fontWeight:700, textAlign:"center" }}>
              ⚠️ {fitapBalance === 0 ? "FITAP" : "SNAP"} balance depleted — visit your caseworker
            </div>
          )}
        </div>

        {/* Stipend notification */}
        {lastStipend && (
          <div style={{
            background: lastStipend === "earned" ? "#0a2a14" : "#1a0004",
            border: `1px solid ${lastStipend === "earned" ? "#4aaf7044" : "#f04a4a44"}`,
            borderRadius: 10, padding: "12px 16px", marginBottom: 12,
            display: "flex", alignItems: "center", gap: 10,
          }}>
            <div style={{ fontSize: 24 }}>{lastStipend === "earned" ? "💵" : "💔"}</div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 13, color: lastStipend === "earned" ? "#4aaf70" : "#f04a4a" }}>
                {lastStipend === "earned" ? "$200 Transportation Stipend — EARNED!" : "Stipend LOST — Hours Not Met"}
              </div>
              <div style={{ fontSize: 12, color: "#7a8a9a", marginTop: 2 }}>
                {lastStipend === "earned"

        )}

              🚨 AUTOMATIC SANCTION — 2 Consecutive Months Without Hours
            </div>
            <div style={{ fontSize: 12, color: "#9a6a6a" }}>
              Per Louisiana Works STEP policy, failure to participate for 2 consecutive months results in an automatic sanction. Your compliance has been reduced significantly. You must complete the Compliance Review to restore standing.
            </div>

        )}
